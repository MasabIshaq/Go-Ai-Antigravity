services:
  - type: web
    name: go-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ZAI_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: glm-4.5-flash
      - key: APP_TITLE
        value: Go Ai
      - key: SITE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"
